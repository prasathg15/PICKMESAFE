                      <img src="../static/images/faces/face5.jpg" alt="image">

                </a>
               
               
              </div>
            </li>

                  <h4 class="card-title">Driver details</h4>
                  
                  <div class="table-responsive">
                    <table class="table">
                      <thead>
                        <tr>
                          <th>Driver name</th>
                          <th>Contact no</th>
                          <th>Vehicle no</th>
                          <th>Date of Joining</th>
						  <th>Action</th>
                        </tr>
                      </thead>
                      <tbody>
					  {% for row in pm_driver %}
                        <tr>
                          <td>{{ row.1 }}</td>
                          <td>{{ row.3 }}</td>
                          <td><label class="badge badge-warning">{{ row.9 }}</label></td>
                          <td>{{ row.7 }}</td>
						  <td><a href="/view_driver?act=ok&did={{ row.0 }}">Delete</a></td>
                        </tr>
						{% endfor %}
                        
                        
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
