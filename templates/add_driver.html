      <!-- partial:../../partials/_navbar.html -->

          <h4 class="font-weight-bold mb-0 d-none d-md-block mt-1">Welcome back, </h4>
          <ul class="navbar-nav navbar-nav-right">
            
            <li class="nav-item dropdown mr-1">
              <a class="nav-link count-indicator dropdown-toggle d-flex justify-content-center align-items-center" id="messageDropdown" href="#" data-toggle="dropdown">

         <div class="navbar-menu-wrapper navbar-search-wrapper d-none d-lg-flex align-items-center">

                <img src="../static/images/faces/face5.jpg" alt="profile"/>
              


              </a>
              
            </li>

            <a href="/logout" class="dropdown-item">
                  <i class="mdi mdi-logout text-primary"></i>
                  Logout
                </a>
			</li>
          </ul>

      <!-- partial -->
      <div class="main-panel">        
        <div class="content-wrapper">
          <div class="row">
            
            
            
            
            
             <div class="col-md-6 mx-auto">
              <div class="card">
                <div class="card-body">
                  <h4 class="card-title">Add driver</h4>
                  
                  <form class="forms-sample" name="form1" method="post" enctype="multipart/form-data">
				 
                    <div class="form-group">
                      <label for="exampleInputUsername1">Driver name</label>
                      <input type="text" class="form-control" name="name" id="exampleInputUsername1" placeholder="Name">
                    </div>
					<div class="form-group">
                      <label for="exampleInputUsername1">Address</label>
                      <input type="text" class="form-control" name="address" id="exampleInputUsername1" placeholder="Address">
                    </div>
					<div class="form-group">
                      <label for="exampleInputUsername1">Contact no</label>
                      <input type="text" name="mobile" class="form-control" id="exampleInputUsername1" placeholder="Mobile no">
                    </div>
					
                    <div class="form-group">
                      <label for="exampleInputEmail1">Email address</label>
                      <input type="text" class="form-control" name="email" id="exampleInputEmail1" placeholder="Email">
                    </div>
					<div class="form-group">
                      <label for="exampleInputUsername1">Driver proof</label>
                      <input type="file" name="profile" class="form-control" id="exampleInputUsername1" accept=".jpg, .png, .jpeg">
                    </div>
                    <div class="form-group">
                      <label for="exampleInputPassword1">username</label>
                      <input type="text" class="form-control" name="username" id="exampleInputPassword1" placeholder="Username">
                    </div>
                    <div class="form-group">
                      <label for="exampleInputConfirmPassword1">Password</label>
                      <input type="password" name="password" class="form-control" id="exampleInputConfirmPassword1" placeholder="Password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary mr-2">Submit</button>
                    
                  </form>
				  {% if msg=="success" %}
				  <span style="color:#009933">Register successful</span>
				
				  <script>
//Using setTimeout to execute a function after 5 seconds.
setTimeout(function () {
   //Redirect with JavaScript
   window.location.href= '/view_driver';
}, 4000);
</script>

				  {% endif %}
				  {% if msg=="fail" %}
				  <span style="color:#FF0000">Oops try, again!</span>
				  {% endif %}
                </div>
              </div>
            </div>
            
            
            
          </div>
        </div>
