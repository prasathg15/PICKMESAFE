                    <div class="form-group">
                      <label for="exampleInputUsername1">Name</label>

                      <label for="exampleInputPassword1">Mobile</label>

                      <label for="exampleInputConfirmPassword1">Registration date</label>
                      <input type="text" class="form-control" id="exampleInputConfirmPassword1" value="{{ data1[11] }}">
                    </div>
                    
                    
                  </form>
                </div>
              </div>
            </div>

                  </p>

                    <div class="form-group row">
                      <label for="exampleInputUsername2" class="col-sm-3 col-form-label">Vehicle no</label>
                      <div class="col-sm-9">
                        <input type="text" class="form-control" id="exampleInputUsername2" value="{{ data1[1] }}">
                      </div>
                    </div>
                    <div class="form-group row">
                      <label for="exampleInputEmail2" class="col-sm-3 col-form-label">Vehicle type</label>

                      </div>
                    </div>
                    <div class="form-group row">
                      <label for="exampleInputMobile" class="col-sm-3 col-form-label">Vehicle name</label>
                      <div class="col-sm-9">
                        <input type="text" class="form-control" id="exampleInputMobile" value="{{ data1[6] }}">
                      </div>
                    </div>
                    <div class="form-group row">
                      <label for="exampleInputPassword2" class="col-sm-3 col-form-label">Color of vehicle</label>
                      <div class="col-sm-9">
                        <input type="text" class="form-control" id="exampleInputPassword2" value="{{ data1[7] }}">
                      </div>
                    </div>
                    <div class="form-group row">
                      <label for="exampleInputConfirmPassword2" class="col-sm-3 col-form-label">Fuel type</label>
                      <div class="col-sm-9">
                        <input type="text" class="form-control" id="exampleInputConfirmPassword2" value="{{ data1[8] }}">
